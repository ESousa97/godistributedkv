services:
  node1:
    build: .
    container_name: kv-node-1
    command: ["./godistributedkv", "--addr", ":50051", "--peers", "node2:50052,node3:50053", "--wal-path", "/data/kv.log"]
    ports:
      - "60001:50051"
    volumes:
      - node1-data:/data
    networks:
      - kv-network

  node2:
    build: .
    container_name: kv-node-2
    command: ["./godistributedkv", "--addr", ":50052", "--peers", "node1:50051,node3:50053", "--wal-path", "/data/kv.log"]
    ports:
      - "60002:50052"
    volumes:
      - node2-data:/data
    networks:
      - kv-network

  node3:
    build: .
    container_name: kv-node-3
    command: ["./godistributedkv", "--addr", ":50053", "--peers", "node1:50051,node2:50052", "--wal-path", "/data/kv.log"]
    ports:
      - "60003:50053"
    volumes:
      - node3-data:/data
    networks:
      - kv-network

volumes:
  node1-data:
  node2-data:
  node3-data:

networks:
  kv-network:
    driver: bridge
