syntax = "proto3";

package kv;

option go_package = "github.com/esousa97/godistributedkv/api/proto";

// KeyValue defines the gRPC service for KV store operations.
service KeyValue {
  // Get retrieves a value by its key.
  rpc Get(GetRequest) returns (GetResponse);
  // Set stores a value associated with a key.
  rpc Set(SetRequest) returns (SetResponse);
  // Delete removes a key and its associated value.
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  // Ping is used for cluster health checks between nodes.
  rpc Ping(PingRequest) returns (PingResponse);
  // RequestVote is used for leader election.
  rpc RequestVote(VoteRequest) returns (VoteResponse);
  // Heartbeat is used by the leader to maintain authority.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  // ReplicateSet is used by the leader to propagate data to followers.
  rpc ReplicateSet(ReplicateRequest) returns (ReplicateResponse);
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  string value = 1;
  bool found = 2;
}

message SetRequest {
  string key = 1;
  string value = 2;
}

message SetResponse {
  bool success = 1;
  string leader_hint = 2;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  bool success = 1;
}

message PingRequest {
  string node_id = 1;
}

message PingResponse {
  string node_id = 1;
  bool healthy = 2;
}

message VoteRequest {
  int64 term = 1;
  string candidate_id = 2;
}

message VoteResponse {
  int64 term = 1;
  bool vote_granted = 2;
}

message HeartbeatRequest {
  int64 term = 1;
  string leader_id = 2;
}

message HeartbeatResponse {
  int64 term = 1;
  bool success = 2;
}

message ReplicateRequest {
  int64 term = 1;
  string leader_id = 2;
  string key = 3;
  string value = 4;
}

message ReplicateResponse {
  int64 term = 1;
  bool success = 2;
}
